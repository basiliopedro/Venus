<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Vénus | Beleza, Perfumes e Bem-Estar</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--preto:#111111;
--rosa:#D7B0B0;
--rosa-soft:#F6EEEE;
--branco:#FFFFFF;
--cinza:#8A8A8A;
}

body{
font-family:'Poppins',sans-serif;
background:var(--preto);
color:var(--branco);
overflow-x:hidden;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(
135deg,
rgba(17,17,17,.95),
rgba(17,17,17,.75)
),
url('https://images.pexels.com/photos/3993449/pexels-photo-3993449.jpeg?auto=compress&cs=tinysrgb&w=1600');

background-size:cover;
background-position:center;
}

.hero-content{
max-width:900px;
}

.logo-small{
font-size:.8rem;
letter-spacing:4px;
text-transform:uppercase;
color:var(--rosa);
margin-bottom:8px;
}

.brand{
font-family:'Cormorant Garamond',serif;
font-size:clamp(4rem,10vw,7rem);
font-weight:700;
line-height:1;
margin-bottom:10px;
}

.subtitle{
font-size:1rem;
color:#d8d8d8;
margin-bottom:25px;
}

.status{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 18px;
border:1px solid rgba(255,255,255,.15);
border-radius:50px;
margin-bottom:50px;
}

.dot{
width:10px;
height:10px;
background:#27c93f;
border-radius:50%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,.04);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
padding:35px;
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:var(--rosa);
}

.card h2{
font-family:'Cormorant Garamond',serif;
font-size:2rem;
margin-bottom:10px;
}

.card p{
color:#cfcfcf;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:var(--rosa);
color:var(--preto);
text-decoration:none;
font-weight:600;
border-radius:10px;
transition:.3s;
}

.btn:hover{
opacity:.9;
}

footer{
padding:30px;
text-align:center;
border-top:1px solid rgba(255,255,255,.08);
background:#0c0c0c;
color:#999;
}

</style>
</head>
<body>

<section class="hero">

<div class="hero-content">

<div class="logo-small">
GRUPO
</div>

<h1 class="brand">
Vénus
</h1>

<p class="subtitle">
Beleza, Perfumes e Bem-Estar em Benguela
</p>

<div class="status">
<div class="dot"></div>
<span>ABERTO • Benguela, Angola</span>
</div>

<div class="cards">

<div class="card">

<h2>Vénus Caprichos</h2>

<p>
Salão de Beleza & Barbearia
</p>

<a href="salao.html" class="btn">
Entrar
</a>

</div>

<div class="card">

<h2>Vénus Fragrância</h2>

<p>
Perfumaria & Cosméticos
</p>

<a href="perfumaria.html" class="btn">
Entrar
</a>

</div>

</div>

</div>

</section>

<footer>
© 2026 Grupo Vénus
</footer>

</body>
</html>
